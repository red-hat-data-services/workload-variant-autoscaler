apiVersion: rbac.authorization.k8s.io/v1
# ClusterRoleBinding because the referenced role grants permissions on
# cluster-scoped resources (tokenreviews, subjectaccessreviews).
kind: ClusterRoleBinding
metadata:
  name: prometheus-metrics-auth-rolebinding
  labels:
    app.kubernetes.io/name: workload-variant-autoscaler
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: metrics-auth-role
# Bind the Prometheus service account to the metrics auth role so it can
# scrape the controller's secure /metrics endpoint. Override the subject
# namespace in an overlay if Prometheus runs elsewhere.
subjects:
- kind: ServiceAccount
  name: kube-prometheus-stack-prometheus
  namespace: workload-variant-autoscaler-monitoring
