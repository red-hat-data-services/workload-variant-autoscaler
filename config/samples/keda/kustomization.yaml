apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: keda-sample
# Annotation-based WVA discovery: no VariantAutoscaling CRD needed.
# WVA discovers the ScaledObject via the llm-d.ai/managed annotation.
# Apply with: kubectl kustomize config/samples/keda | kubectl apply -f -
resources:
- annotations/scaledobject.yaml
