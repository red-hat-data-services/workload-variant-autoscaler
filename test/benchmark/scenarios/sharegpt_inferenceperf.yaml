load:
  type: constant
  stages:
  - rate: 5
    duration: 300
  - rate: 10
    duration: 300
  - rate: 15
    duration: 300
  request_timeout: 300
api:
  type: completion
  streaming: true
server:
  type: vllm
  model_name: REPLACE_ENV_LLMDBENCH_DEPLOY_CURRENT_MODEL
  base_url: REPLACE_ENV_LLMDBENCH_HARNESS_STACK_ENDPOINT_URL
  ignore_eos: true
tokenizer:
  pretrained_model_name_or_path: REPLACE_ENV_LLMDBENCH_DEPLOY_CURRENT_MODEL
data:
  type: shareGPT
  input_distribution:
    min: 10
    max: 2048
  output_distribution:
    min: 10
    max: 1024
report:
  request_lifecycle:
    summary: true
    per_stage: true
    per_request: true
storage:
  local_storage:
    path: /workspace
