# InferenceObjective for GIE queuing (scale-from-zero flow control).
# Applied by e2e test setup (test/e2e/fixtures) when scale-from-zero tests run.
# poolRef.name is templated to match the deployed InferencePool.
apiVersion: inference.networking.x-k8s.io/v1alpha2
kind: InferenceObjective
metadata:
  name: e2e-default
  namespace: NAMESPACE_PLACEHOLDER
spec:
  priority: 0
  poolRef:
    name: POOL_NAME_PLACEHOLDER
    kind: InferencePool
    group: inference.networking.x-k8s.io
