{{- if .Values.vllmService.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "workload-variant-autoscaler.fullname" . }}-vllm-mon
  namespace: {{ .Values.llmd.namespace }}
  labels:
    {{- include "workload-variant-autoscaler.labels" . | nindent 4 }}
    llm-d.ai/model: {{ .Values.llmd.modelName }}
    openshift.io/user-monitoring: "true"
spec:
  selector:
    matchLabels:
      llm-d.ai/model: {{ .Values.llmd.modelName }}
  endpoints:
  - port: vllm
    path: /metrics
    interval: {{ .Values.vllmService.interval }}
    scheme: {{ .Values.vllmService.scheme | default "http" }}
    {{- if eq (.Values.vllmService.scheme | default "http") "https" }}
    tlsConfig:
      insecureSkipVerify: {{ .Values.wva.prometheus.tls.insecureSkipVerify }}
    bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
    {{- end }}
    # Propagate the llm-d.ai/variant pod label into scraped metrics.
    # __meta_* labels are only available during target relabeling, so this
    # must live under relabelings (not metricRelabelings).
    relabelings:
    - sourceLabels: [__meta_kubernetes_pod_label_llm_d_ai_variant]
      targetLabel: llm_d_ai_variant
      action: replace
  namespaceSelector:
    any: true
{{- end }}
